<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone 13 or older?</title>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
    }
    #answer { font-size: 96px; font-weight: 800; line-height: 1; }
    #prob   { font-size: 56px; font-weight: 600; margin-top: 14px; }
  </style>
</head>

<body>
  <div id="answer">…</div>
  <div id="prob"></div>

  <script>
    (function () {
      // ---------- read the real device screen size (CSS points) ----------
      var sw = screen.width, sh = screen.height;
      var W = Math.min(sw, sh);   // short side
      var H = Math.max(sw, sh);   // long side
      var isIPhone = /iPhone/i.test(navigator.userAgent || '');

      // Screen sizes used ONLY by iPhone 13 and every OLDER iPhone.
      // This list is closed — no future iPhone can ever join it.
      var YES_RES = [
        [320, 480], [320, 568], [375, 667],
        [414, 736], [375, 812], [414, 896]
      ];
      function isRes(a) { return a[0] === W && a[1] === H; }

      // Two sizes are SHARED by old and new models — the only uncertain cases:
      //   390x844 : iPhone 12/12Pro/13/13Pro (YES)  vs  iPhone 14/16e (NO)
      //   428x926 : iPhone 12ProMax/13ProMax (YES)  vs  iPhone 14 Plus (NO)
      function decide() {
        if (!isIPhone)              return { p: 0, fixed: true }; // not an iPhone
        if (YES_RES.some(isRes))    return { p: 1, fixed: true }; // 13 or older
        if (W === 390 && H === 844) return { p: null, res: 390 }; // ambiguous
        if (W === 428 && H === 926) return { p: null, res: 428 }; // ambiguous
        return { p: 0, fixed: true };                            // newer iPhone
      }

      // ---------- GPU speed test (used only for the 2 ambiguous sizes) ----------
      // A faster chip => smaller time per draw. A18 (iPhone 16e) is clearly
      // faster than A15 (13/14); A14 (iPhone 12) is clearly slower.
      function gpuPerDrawMs() {
        try {
          var cv = document.createElement('canvas');
          cv.width = 720; cv.height = 720;
          var gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
          if (!gl) return null;

          var vs = gl.createShader(gl.VERTEX_SHADER);
          gl.shaderSource(vs, 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}');
          gl.compileShader(vs);

          var fs = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(fs,
            'precision highp float;void main(){' +
            'vec2 c=gl_FragCoord.xy*0.0019;float v=c.x+c.y;' +
            'for(int i=0;i<600;i++){v=fract(v*1.3140001+c.x*0.7+0.123);}' +
            'gl_FragColor=vec4(v,fract(v*2.0),fract(v*4.0),1.0);}');
          gl.compileShader(fs);

          var pr = gl.createProgram();
          gl.attachShader(pr, vs); gl.attachShader(pr, fs); gl.linkProgram(pr);
          if (!gl.getProgramParameter(pr, gl.LINK_STATUS)) return null;
          gl.useProgram(pr);

          var b = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, b);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
          var loc = gl.getAttribLocation(pr, 'p');
          gl.enableVertexAttribArray(loc);
          gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
          gl.viewport(0, 0, 720, 720);
          gl.enable(gl.BLEND);
          gl.blendFunc(gl.ONE, gl.ONE); // forces every draw to actually run

          var px = new Uint8Array(4), DRAWS = 30, best = Infinity;
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);                 // warm-up
          gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
          for (var pass = 0; pass < 5; pass++) {
            var t = performance.now();
            for (var d = 0; d < DRAWS; d++) gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px); // waits for GPU
            var dt = performance.now() - t;
            if (dt < best) best = dt;
          }
          return best / DRAWS;
        } catch (e) { return null; }
      }

      // newness: +1 = very fast chip (A18), 0 = A15, negative = A14 / slow
      function newness() {
        var ms = gpuPerDrawMs();
        if (ms == null) return 0;
        return Math.max(-1, Math.min(1, (2.0 - ms) / 1.2));
      }

      function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }

      // Probability the device is "iPhone 13 or older" for the ambiguous sizes.
      // These can NEVER reach 100% — iPhone 13 and 14 are identical to a browser.
      function probAmbiguous(res) {
        var n = newness();
        if (res === 390) return clamp(0.60 - 0.22 * n, 0.38, 0.78);
        return clamp(0.55 - 0.16 * Math.min(n, 0), 0.52, 0.74);
      }

      function show(p) {
        var yes = p >= 0.5;
        var pct = Math.round((yes ? p : 1 - p) * 100);
        var col = yes ? '#1d9e75' : '#d8452f';
        var a = document.getElementById('answer');
        var q = document.getElementById('prob');
        a.textContent = yes ? 'YES' : 'NO';
        q.textContent = pct + '%';
        a.style.color = q.style.color = col;
      }

      var d = decide();
      if (d.p !== null) {
        show(d.p);                                    // 100% certain cases
      } else {
        setTimeout(function () { show(probAmbiguous(d.res)); }, 30);
      }
    })();
  </script>
</body>

</html>
