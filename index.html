<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Inspector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="sr-only">Device Inspector — your device information is displayed here</h1>

<div class="page-wrapper">

  <p class="page-label">Device Inspector</p>

  <!-- Hero -->
  <div class="hero-card">
    <div class="hero-icon-wrap">
      <i class="ti ti-device-mobile" aria-hidden="true"></i>
    </div>
    <div class="hero-name" id="device-name">Detecting…</div>
    <div class="hero-os"   id="device-os">Loading OS version…</div>
    <span class="hero-badge" id="platform-badge">
      <i class="ti ti-circle-dot" aria-hidden="true"></i>
      Detecting
    </span>
  </div>

  <!-- Results -->
  <div class="glass-card" id="results-card">
    <div class="card-heading">
      <i class="ti ti-info-circle" aria-hidden="true"></i>
      Device Information
    </div>
    <div id="results-container"></div>
  </div>

  <!-- Toggles -->
  <div class="glass-card">
    <div class="card-heading">
      <i class="ti ti-adjustments-horizontal" aria-hidden="true"></i>
      Customize Display
    </div>
    <div id="toggles-container"></div>
  </div>

</div>

<script>
  // ── WebGL GPU-generation signal ────────────────────────────────────────────
  // MAX_TEXTURE_SIZE ≥ 16384 → A12 chip or newer (iPhone XR/XS 2018+)
  // MAX_TEXTURE_SIZE = 8192  → A11 or older (iPhone X, 8, 7 …)
  function glMaxTex() {
    try {
      const c = document.createElement("canvas");
      const gl = c.getContext("webgl2") || c.getContext("webgl");
      if (!gl) return 0;
      const size = gl.getParameter(gl.MAX_TEXTURE_SIZE);
      c.width = c.height = 1; // free memory
      return size || 0;
    } catch { return 0; }
  }

  // ── UA Client Hints (Chrome / Edge only) ───────────────────────────────────
  // Cached in sessionStorage so refresh never gives a different result.
  async function getClientHints() {
    const KEY = "di_hints_v1";
    try {
      const hit = sessionStorage.getItem(KEY);
      if (hit) return JSON.parse(hit);
    } catch {}
    try {
      if (!navigator.userAgentData) return null;
      const h = await navigator.userAgentData.getHighEntropyValues(
        ["platform", "platformVersion", "model", "mobile", "architecture"]
      );
      try { sessionStorage.setItem(KEY, JSON.stringify(h)); } catch {}
      return h;
    } catch { return null; }
  }

  // ── macOS marketing name helper ────────────────────────────────────────────
  function macOSName(major) {
    return { 15: "Sequoia", 14: "Sonoma", 13: "Ventura", 12: "Monterey", 11: "Big Sur" }[major] || "";
  }

  // ── Fields config ──────────────────────────────────────────────────────────
  const fields = [
    { id: "model",      label: "Device model",           shortLabel: "Model",       icon: "ti-device-mobile",    default: true  },
    { id: "os",         label: "Operating system",        shortLabel: "OS",          icon: "ti-versions",         default: true  },
    { id: "screen",     label: "Screen resolution",       shortLabel: "Resolution",  icon: "ti-maximize",         default: true  },
    { id: "ratio",      label: "Pixel ratio / HiDPI",     shortLabel: "Pixel Ratio", icon: "ti-photo",            default: false },
    { id: "browser",    label: "Browser name & version",  shortLabel: "Browser",     icon: "ti-browser",          default: true  },
    { id: "lang",       label: "Device language",         shortLabel: "Language",    icon: "ti-language",         default: false },
    { id: "memory",     label: "RAM (if available)",      shortLabel: "RAM",         icon: "ti-cpu",              default: false },
    { id: "cores",      label: "CPU cores",               shortLabel: "CPU Cores",   icon: "ti-circuit-board",    default: false },
    { id: "battery",    label: "Battery level",           shortLabel: "Battery",     icon: "ti-battery-2",        default: false },
    { id: "network",    label: "Network type",            shortLabel: "Network",     icon: "ti-wifi",             default: false },
    { id: "touch",      label: "Touch support",           shortLabel: "Touch",       icon: "ti-hand-finger",      default: false },
    { id: "standalone", label: "PWA / Homescreen mode",   shortLabel: "PWA Mode",    icon: "ti-layout-bottombar", default: false },
  ];

  const state = {};
  fields.forEach(f => state[f.id] = f.default);

  // ── Platform detection ─────────────────────────────────────────────────────
  function detectPlatform(hints) {
    const ua = navigator.userAgent;

    // Chrome/Edge: use the accurate Client Hints API
    if (hints) {
      const p = hints.platform;
      if (p === "Android")
        return hints.mobile
          ? { family: "Android",   label: "Android",        icon: "ti-device-mobile"  }
          : { family: "Android",   label: "Android Tablet", icon: "ti-device-tablet"  };
      if (p === "Windows")  return { family: "Windows",   label: "Windows",        icon: "ti-device-laptop"  };
      if (p === "macOS")    return { family: "macOS",     label: "macOS",          icon: "ti-brand-apple"    };
      if (p === "Linux") {
        if (/CrOS/.test(ua)) return { family: "Chrome OS", label: "Chrome OS",     icon: "ti-device-laptop"  };
        return               { family: "Linux",     label: "Linux",          icon: "ti-brand-ubuntu"   };
      }
    }

    // UA-string fallback (Safari, Firefox, older browsers)
    const isIPhone   = /iPhone/.test(ua);
    const isIPad     = /iPad/.test(ua) || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
    const isIPod     = /iPod/.test(ua);
    const isAndroid  = /Android/.test(ua);
    const isWindows  = /Windows NT/.test(ua);
    const isMac      = /Macintosh/.test(ua) && !isIPad;
    const isChromeOS = /CrOS/.test(ua);
    const isLinux    = /Linux/.test(ua) && !isAndroid && !isChromeOS;

    if (isIPhone)   return { family: "iOS",       label: "iPhone",         icon: "ti-device-mobile"  };
    if (isIPad)     return { family: "iPadOS",    label: "iPad",           icon: "ti-device-ipad"    };
    if (isIPod)     return { family: "iOS",       label: "iPod touch",     icon: "ti-device-mobile"  };
    if (isAndroid && /Mobile/.test(ua))
                    return { family: "Android",   label: "Android",        icon: "ti-device-mobile"  };
    if (isAndroid)  return { family: "Android",   label: "Android Tablet", icon: "ti-device-tablet"  };
    if (isWindows)  return { family: "Windows",   label: "Windows",        icon: "ti-device-laptop"  };
    if (isMac)      return { family: "macOS",     label: "macOS",          icon: "ti-brand-apple"    };
    if (isChromeOS) return { family: "Chrome OS", label: "Chrome OS",      icon: "ti-device-laptop"  };
    if (isLinux)    return { family: "Linux",     label: "Linux",          icon: "ti-brand-ubuntu"   };
    return                { family: "Unknown",    label: "Unknown",        icon: "ti-device-desktop" };
  }

  // ── OS version ─────────────────────────────────────────────────────────────
  function getOSVersion(platform, hints) {
    const ua = navigator.userAgent;
    // Chromium browsers (Chrome, Edge, Opera) freeze the UA string —
    // macOS always shows "10_15_7" and Android may show an old version.
    // When on Chromium without Client Hints, don't show the frozen value.
    const isChromium = !!navigator.userAgentData;

    // Client Hints path — always accurate, not frozen
    if (hints?.platformVersion) {
      const ver   = hints.platformVersion;
      const major = parseInt(ver.split(".")[0], 10);
      if (platform.family === "Windows") {
        if (major >= 13) return "Windows 11";
        if (major >= 1)  return "Windows 10";
        return "Windows 10 / 11";
      }
      if (platform.family === "macOS") {
        const mkt = macOSName(major);
        return mkt ? `macOS ${mkt} ${ver}` : `macOS ${ver}`;
      }
      if (platform.family === "Android") return `Android ${ver}`;
    }

    // UA fallback
    switch (platform.family) {
      case "iOS":
      case "iPadOS": {
        // Safari never freezes iOS version
        const m = ua.match(/OS (\d+)[_.](\d+)(?:[_.](\d+))?/);
        return m ? `${platform.family} ${m[1]}.${m[2]}${m[3] ? "." + m[3] : ""}` : platform.family;
      }
      case "Android": {
        const m = ua.match(/Android ([\d.]+)/);
        return m ? `Android ${m[1]}` : "Android";
      }
      case "Windows": {
        const m = ua.match(/Windows NT ([\d.]+)/);
        if (!m) return "Windows";
        const map = { "10.0": "Windows 10 / 11", "6.3": "Windows 8.1", "6.2": "Windows 8", "6.1": "Windows 7" };
        return map[m[1]] || `Windows NT ${m[1]}`;
      }
      case "macOS": {
        // Chrome freezes macOS UA at "10_15_7" — never show that wrong value
        if (isChromium) return "macOS";
        const m = ua.match(/Mac OS X ([\d_]+)/);
        if (!m) return "macOS";
        const ver = m[1].replace(/_/g, ".");
        const mkt = macOSName(parseInt(ver.split(".")[0], 10));
        return mkt ? `macOS ${mkt} ${ver}` : `macOS ${ver}`;
      }
      case "Chrome OS": {
        const m = ua.match(/CrOS\s+\S+\s+([\d.]+)/);
        return m ? `Chrome OS ${m[1]}` : "Chrome OS";
      }
      default: return platform.family;
    }
  }

  // ── iOS / iPadOS model ─────────────────────────────────────────────────────
  // Each entry: { name, w (portrait CSS px), h, dpr, minTex? }
  // minTex: minimum MAX_TEXTURE_SIZE → A12+ = 16384, A11- = 8192
  // When multiple phones share all signals, name lists them with " / ".
  // That is the maximum precision browsers allow — Apple blocks deeper access.
  const IPHONE_MODELS = [
    // ── Unique screen sizes ──────────────────────────────────────────────────
    { name: "iPhone 16 Pro Max",                              w: 440, h: 956,  dpr: 3, minTex: 16384 },
    { name: "iPhone 16 Pro",                                  w: 402, h: 874,  dpr: 3, minTex: 16384 },
    // ── Groups that share all detectable signals ─────────────────────────────
    { name: "iPhone 16 Plus / 15 Pro Max / 15 Plus / 14 Pro Max", w: 430, h: 932, dpr: 3, minTex: 16384 },
    { name: "iPhone 16 / 15 Pro / 15 / 14 Pro",              w: 393, h: 852,  dpr: 3, minTex: 16384 },
    { name: "iPhone 14 Plus / 13 Pro Max / 12 Pro Max",       w: 428, h: 926,  dpr: 3, minTex: 16384 },
    { name: "iPhone 14 / 13 Pro / 13 / 12 Pro / 12",         w: 390, h: 844,  dpr: 3, minTex: 16384 },
    { name: "iPhone 11 Pro Max / XS Max",                     w: 414, h: 896,  dpr: 3, minTex: 16384 },
    { name: "iPhone 11 / XR",                                 w: 414, h: 896,  dpr: 2, minTex: 16384 },
    // minTex splits the 375×812 group: A12+ vs A11
    { name: "iPhone 13 mini / 12 mini / 11 Pro",              w: 375, h: 812,  dpr: 3, minTex: 16384 },
    { name: "iPhone X / XS",                                  w: 375, h: 812,  dpr: 3, minTex: 8192  },
    { name: "iPhone 8 Plus / 7 Plus / 6s Plus",               w: 414, h: 736,  dpr: 3, minTex: 8192  },
    { name: "iPhone SE (3rd/2nd gen) / 8 / 7 / 6s",          w: 375, h: 667,  dpr: 2, minTex: 8192  },
    { name: "iPhone SE (1st gen) / 5s",                       w: 320, h: 568,  dpr: 2, minTex: 8192  },
  ];

  const IPAD_MODELS = [
    { name: 'iPad Pro 13" (M4)',        w: 1032, h: 1376, dpr: 2 },
    { name: 'iPad Pro 11" (M4)',        w: 834,  h: 1210, dpr: 2 },
    { name: 'iPad Pro 12.9" (M2/M1)',   w: 1024, h: 1366, dpr: 2 },
    { name: 'iPad Pro 11" (M2/M1/2nd)', w: 834,  h: 1194, dpr: 2 },
    { name: 'iPad Air 13" (M2)',        w: 1024, h: 1366, dpr: 2 },
    { name: 'iPad Air 11" (M2) / Air (5th) / iPad (10th)',    w: 820, h: 1180, dpr: 2 },
    { name: 'iPad mini (6th gen)',      w: 744,  h: 1133, dpr: 2 },
    { name: 'iPad (9th gen) / Air (4th) / Pro 11" (1st)',     w: 810, h: 1080, dpr: 2 },
    { name: 'iPad (8th gen) / Air (3rd) / Pro 10.5"',         w: 768, h: 1024, dpr: 2 },
    { name: 'iPad mini (5th gen)',      w: 768,  h: 1024, dpr: 2 },
  ];

  function detectiOSModel(isIPad, texSize) {
    // Always compare in portrait orientation (smaller dim = width)
    const pw = Math.min(screen.width,  screen.height);
    const ph = Math.max(screen.width,  screen.height);
    const dpr = window.devicePixelRatio || 1;

    const list = isIPad ? IPAD_MODELS : IPHONE_MODELS;

    // Try exact match including GPU-generation signal
    if (texSize > 0) {
      const hit = list.find(m =>
        m.w === pw && m.h === ph && m.dpr === dpr &&
        m.minTex !== undefined && texSize >= m.minTex
      );
      if (hit) return hit.name;
    }

    // Fallback: CSS pixels + DPR only
    const hit = list.find(m => m.w === pw && m.h === ph && m.dpr === dpr);
    if (hit) return hit.name;

    // Unknown — show raw signals for manual lookup
    return `${isIPad ? "iPad" : "iPhone"} (${pw}×${ph} @${dpr}×)`;
  }

  // ── Device model ───────────────────────────────────────────────────────────
  function getDeviceModel(platform, hints, texSize) {
    const ua = navigator.userAgent;

    if (platform.family === "iOS" || platform.family === "iPadOS") {
      return detectiOSModel(platform.family === "iPadOS", texSize);
    }

    // Android: Client Hints gives the exact model name in Chrome
    if (platform.family === "Android") {
      if (hints?.model && hints.model !== "") return hints.model;
      // UA fallback: (Linux; Android 14; Pixel 8 Build/...)
      const m1 = ua.match(/Android[\d. ]+;\s*([^;)]+?)(?:\s+Build\/|\))/);
      if (m1) return m1[1].trim();
      const m2 = ua.match(/;\s*([^;)]+?)\s+Build\//);
      if (m2) return m2[1].trim();
      return "Android Device";
    }

    return { macOS: "Mac", Windows: "Windows PC", "Chrome OS": "Chromebook", Linux: "Linux PC" }
      [platform.family] || "Unknown Device";
  }

  // ── Browser detection ──────────────────────────────────────────────────────
  function getBrowserInfo() {
    const ua = navigator.userAgent;
    if (/CriOS\/([\d.]+)/.test(ua))           return `Chrome ${RegExp.$1} (iOS)`;
    if (/FxiOS\/([\d.]+)/.test(ua))           return `Firefox ${RegExp.$1} (iOS)`;
    if (/EdgiOS\/([\d.]+)/.test(ua))          return `Edge ${RegExp.$1} (iOS)`;
    if (/Edg\/([\d.]+)/.test(ua))             return `Edge ${RegExp.$1}`;
    if (/OPR\/([\d.]+)/.test(ua))             return `Opera ${RegExp.$1}`;
    if (/Chrome\/([\d.]+)/.test(ua))          return `Chrome ${RegExp.$1}`;
    if (/Firefox\/([\d.]+)/.test(ua))         return `Firefox ${RegExp.$1}`;
    if (/Version\/([\d.]+).*Safari/.test(ua)) return `Safari ${RegExp.$1}`;
    return "Unknown Browser";
  }

  // ── Network ────────────────────────────────────────────────────────────────
  function getNetwork() {
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (!c) return "Unknown";
    const t = c.effectiveType || c.type || "";
    if (t === "4g" || t === "5g")          return t.toUpperCase();
    if (t === "wifi" || c.type === "wifi") return "Wi-Fi";
    if (t === "3g")                        return "3G";
    if (t === "2g")                        return "2G";
    return t || "Unknown";
  }

  // ── Battery ────────────────────────────────────────────────────────────────
  async function fetchBattery() {
    if (!navigator.getBattery) return "Not available";
    try {
      const b = await navigator.getBattery();
      return `${b.charging ? "⚡ " : ""}${Math.round(b.level * 100)}%`;
    } catch { return "Not available"; }
  }

  // ── Collect all data ───────────────────────────────────────────────────────
  function getAllData(platform, hints, texSize) {
    const w = screen.width, h = screen.height, r = window.devicePixelRatio || 1;
    const pw = Math.round(w * r), ph = Math.round(h * r);
    return {
      model:      getDeviceModel(platform, hints, texSize),
      os:         getOSVersion(platform, hints),
      screen:     `${w} × ${h} px  (${pw} × ${ph} physical)`,
      ratio:      `${r}× (${r >= 2 ? "HiDPI / Retina" : "Standard"})`,
      browser:    getBrowserInfo(),
      lang:       navigator.language || "Unknown",
      memory:     navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : "Not available",
      cores:      navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} cores` : "Not available",
      battery:    "Fetching…",
      network:    getNetwork(),
      touch:      navigator.maxTouchPoints > 0 ? `Yes (${navigator.maxTouchPoints} pts)` : "No",
      standalone: window.navigator.standalone === true ? "Yes — Homescreen" : "In browser",
    };
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render(data, platform) {
    document.getElementById("device-name").textContent = data.model;
    document.getElementById("device-os").textContent   = data.os;

    const heroI = document.querySelector(".hero-icon-wrap i");
    if (heroI) heroI.className = `ti ${platform.icon}`;

    document.getElementById("platform-badge").innerHTML =
      `<i class="ti ${platform.icon}" aria-hidden="true"></i> ${platform.label}`;

    const container = document.getElementById("results-container");
    const visible   = fields.filter(f => state[f.id]);

    if (visible.length === 0) {
      container.innerHTML = `<div class="empty-state">No information selected — toggle some fields below.</div>`;
      return;
    }

    container.innerHTML = `<div class="results-grid">${
      visible.map(f => `
        <div class="result-tile">
          <div class="result-tile-icon"><i class="ti ${f.icon}" aria-hidden="true"></i></div>
          <div class="result-tile-label">${f.shortLabel}</div>
          <div class="result-tile-val" id="val-${f.id}">${data[f.id]}</div>
        </div>
      `).join("")
    }</div>`;
  }

  // ── Toggles ────────────────────────────────────────────────────────────────
  function buildToggles(data, platform) {
    const c = document.getElementById("toggles-container");
    if (!c) return;
    c.innerHTML = fields.map(f => `
      <div class="toggle-row">
        <div class="toggle-row-left">
          <span class="toggle-icon"><i class="ti ${f.icon}" aria-hidden="true"></i></span>
          <span class="toggle-label">${f.label}</span>
        </div>
        <label class="toggle" aria-label="Toggle ${f.label}">
          <input type="checkbox" id="toggle-${f.id}" ${state[f.id] ? "checked" : ""}>
          <span class="slider-t"></span>
        </label>
      </div>
    `).join("");

    fields.forEach(f => {
      document.getElementById(`toggle-${f.id}`)
        .addEventListener("change", e => { state[f.id] = e.target.checked; render(data, platform); });
    });
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  (async () => {
    try {
      const [hints, texSize] = await Promise.all([getClientHints(), Promise.resolve(glMaxTex())]);
      const platform = detectPlatform(hints);
      const data     = getAllData(platform, hints, texSize);
      buildToggles(data, platform);
      render(data, platform);
      data.battery = await fetchBattery();
      if (state.battery) {
        const el = document.getElementById("val-battery");
        if (el) el.textContent = data.battery;
      }
    } catch (err) {
      console.error("Device Inspector error:", err);
    }
  })();
</script>

</body>
</html>
