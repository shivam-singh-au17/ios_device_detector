<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone 13 or Older?</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f7;
    }

    #result {
      font-size: 28px;
      font-weight: 500;
      text-align: center;
      padding: 2rem;
    }

    #answer {
      font-size: 72px;
      font-weight: 700;
      margin: 1rem 0;
    }

    #prob {
      font-size: 48px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div id="result">
    Checking…
    <div id="answer"></div>
    <div id="prob"></div>
  </div>

  <script>
    (function () {
      const ua = navigator.userAgent || '';
      const isIPhone = /iPhone/.test(ua);
      const w = Math.min(screen.width, screen.height);
      const h = Math.max(screen.width, screen.height);
      const dpr = window.devicePixelRatio || 1;

      // Resolutions EXCLUSIVE to iPhone 14 Pro / 15 / 16 family (definitely NEWER than 13)
      const newerThan13 = [[393, 852], [402, 874], [430, 932], [440, 956]];
      // Resolutions shared by iPhone 12/13 (and 14 standard) — ambiguous
      const ambiguousFamily = [[375, 812], [390, 844], [428, 926]];
      // Older iPhone resolutions (XR/11, X/XS, SE, etc.) — definitely 13 or older
      const olderResolutions = [
        [375, 667],   // iPhone 6/7/8/SE2/SE3
        [320, 568],   // iPhone 5/SE1
        [414, 736],   // iPhone 6+/7+/8+
        [375, 812],   // iPhone X/XS/11 Pro/12 mini/13 mini
        [414, 896],   // iPhone XR/XS Max/11/11 Pro Max
      ];

      const isDefinitelyNewer = newerThan13.some(([mw, mh]) => mw === w && mh === h);
      const isAmbiguous = ambiguousFamily.some(([mw, mh]) => mw === w && mh === h);

      // WebGL chip detection — A16/A17/A18 means NEWER than 13
      let newerChipScore = 0;
      try {
        const gl = document.createElement('canvas').getContext('webgl');
        const ext = gl && gl.getExtension('WEBGL_debug_renderer_info');
        const r = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : (gl && gl.getParameter(gl.RENDERER)) || '';
        if (/A(1[6-9]|[2-9]\d)/i.test(r)) newerChipScore = 1; // A16+
        else if (/A15/i.test(r)) newerChipScore = -1; // A15 = iPhone 13, counts as "13 or older"
      } catch (e) { }

      // GPU benchmark
      function bench(cb) {
        try {
          const c = document.createElement('canvas'); c.width = 512; c.height = 512;
          const gl = c.getContext('webgl'); if (!gl) return cb(null);
          const vs = gl.createShader(gl.VERTEX_SHADER);
          gl.shaderSource(vs, 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}'); gl.compileShader(vs);
          const fs = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(fs, 'precision highp float;void main(){float v=0.;for(int i=0;i<200;i++){v+=sin(float(i)*gl_FragCoord.x*.01)*cos(float(i)*gl_FragCoord.y*.01);}gl_FragColor=vec4(fract(v),fract(v*1.3),fract(v*1.7),1.);}');
          gl.compileShader(fs);
          const p = gl.createProgram(); gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p); gl.useProgram(p);
          const b = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, b);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
          const loc = gl.getAttribLocation(p, 'p'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
          const t0 = performance.now();
          for (let i = 0; i < 30; i++) gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          const px = new Uint8Array(4); gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
          cb((performance.now() - t0) / 30);
        } catch (e) { cb(null); }
      }

      bench(function (ms) {
        // benchScore: high = newer chip, low = older chip
        let benchNewer = 0;
        if (ms != null) {
          if (ms < 3) benchNewer = 1;       // very fast = A16+
          else if (ms < 5) benchNewer = 0.3; // could be A15 or A16
          else if (ms < 10) benchNewer = -0.5; // A13/A14/A15 range
          else benchNewer = -1;              // older
        }

        // Calculate probability that device is iPhone 13 OR OLDER
        let p13OrOlder = 0.5; // start neutral

        if (!isIPhone) {
          p13OrOlder = 0; // not an iPhone at all
        } else {
          if (isDefinitelyNewer) {
            p13OrOlder = 0.05; // resolution proves it's newer than 13
          } else {
            p13OrOlder = 0.5;
            // Chip signal
            if (newerChipScore === 1) p13OrOlder -= 0.35; // A16+ detected
            else if (newerChipScore === -1) p13OrOlder += 0.35; // A15 detected
            // Benchmark signal
            p13OrOlder -= 0.20 * benchNewer;
            // Old resolution = strong signal for 13 or older
            const isOldRes = olderResolutions.some(([mw, mh]) => mw === w && mh === h);
            if (isOldRes && !isAmbiguous) p13OrOlder += 0.30;
          }
        }

        p13OrOlder = Math.min(1, Math.max(0, p13OrOlder));
        const pct = Math.round(p13OrOlder * 100);

        const isYes = pct >= 50;
        const color = isYes ? '#1d9e75' : '#d85a30';

        document.getElementById('answer').textContent = isYes ? 'YES' : 'NO';
        document.getElementById('answer').style.color = color;
        document.getElementById('prob').textContent = pct + '%';
        document.getElementById('prob').style.color = color;

        // Update label text
        document.getElementById('result').firstChild.textContent = isYes
          ? 'iPhone 13 or older'
          : 'iPhone newer than 13';
      });
    })();
  </script>
</body>

</html>
