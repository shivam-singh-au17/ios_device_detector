<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 13+ Detector</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f7; }
  #result { font-size: 28px; font-weight: 500; text-align: center; padding: 2rem; }
  #prob { font-size: 48px; font-weight: 600; margin-top: 1rem; }
</style>
</head>
<body>
  <div id="result">
    Checking…
    <div id="prob"></div>
  </div>

<script>
(function () {
  const ua = navigator.userAgent || '';
  const isIPhone = /iPhone/.test(ua);
  const w = Math.min(screen.width, screen.height);
  const h = Math.max(screen.width, screen.height);
  const dpr = window.devicePixelRatio || 1;

  // Resolutions exclusive to iPhone 14 Pro / 15 / 16 family (definitely >= 13)
  const exclusive13Plus = [[393,852],[402,874],[430,932],[440,956]];
  // Resolutions of iPhone 12-16 family (cannot tell 12 from 13 by size alone)
  const family12to16 = [[375,812],[390,844],[428,926]];

  const isExclusive = exclusive13Plus.some(([mw,mh]) => mw===w && mh===h);
  const isFamily = family12to16.some(([mw,mh]) => mw===w && mh===h);

  // WebGL chip detection
  let chipScore = 0;
  try {
    const gl = document.createElement('canvas').getContext('webgl');
    const ext = gl && gl.getExtension('WEBGL_debug_renderer_info');
    const r = ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : (gl && gl.getParameter(gl.RENDERER)) || '';
    if (/A(1[5-9]|[2-9]\d)/i.test(r)) chipScore = 1;
    else if (/Apple GPU/i.test(r)) chipScore = 0.3;
  } catch(e) {}

  // GPU benchmark
  function bench(cb) {
    try {
      const c = document.createElement('canvas'); c.width=512; c.height=512;
      const gl = c.getContext('webgl'); if (!gl) return cb(null);
      const vs = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vs,'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}'); gl.compileShader(vs);
      const fs = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fs,'precision highp float;void main(){float v=0.;for(int i=0;i<200;i++){v+=sin(float(i)*gl_FragCoord.x*.01)*cos(float(i)*gl_FragCoord.y*.01);}gl_FragColor=vec4(fract(v),fract(v*1.3),fract(v*1.7),1.);}');
      gl.compileShader(fs);
      const p = gl.createProgram(); gl.attachShader(p,vs); gl.attachShader(p,fs); gl.linkProgram(p); gl.useProgram(p);
      const b = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b);
      gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(p,'p'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
      const t0 = performance.now();
      for (let i=0;i<30;i++) gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      const px = new Uint8Array(4); gl.readPixels(0,0,1,1,gl.RGBA,gl.UNSIGNED_BYTE,px);
      cb((performance.now()-t0)/30);
    } catch(e) { cb(null); }
  }

  bench(function(ms) {
    let benchScore = 0;
    if (ms != null) {
      if (ms < 4) benchScore = 1;
      else if (ms < 8) benchScore = 0.7;
      else if (ms < 16) benchScore = 0.3;
      else benchScore = 0;
    }

    // Weighted probability
    let p = 0;
    if (!isIPhone) { p = 0; }
    else {
      p += 0.20; // is iPhone
      if (isExclusive) p += 0.35;
      else if (isFamily && dpr === 3) p += 0.15;
      p += 0.25 * chipScore;
      p += 0.20 * benchScore;
    }
    p = Math.min(1, Math.max(0, p));
    const pct = Math.round(p * 100);

    const isLikely = pct >= 60;
    document.getElementById('result').innerHTML =
      (isLikely ? 'Likely iPhone 13 or later' : 'Probably NOT iPhone 13 or later') +
      '<div id="prob" style="color:' + (isLikely ? '#1d9e75' : '#d85a30') + '">' + pct + '%</div>';
  });
})();
</script>
</body>
</html>
